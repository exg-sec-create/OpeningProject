<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出店プロジェクト管理 — 大崎</title>
<style>
:root{--ink:#14202e;--ink2:#31465c;--line:#c9d2dc;--paper:#eef1f4;--card:#fff;--blue:#2f5d8a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;background:var(--paper);
  color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.box{max-width:760px;width:100%}
.eyebrow{font-family:'SFMono-Regular',Consolas,monospace;font-size:11px;letter-spacing:.2em;color:var(--ink2);text-transform:uppercase}
h1{font-size:28px;font-weight:800;margin:4px 0 6px}
.sub{color:var(--ink2);font-size:14px;margin-bottom:28px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:640px){.cards{grid-template-columns:1fr}}
a.card{display:block;background:var(--card);border:1px solid var(--line);border-radius:3px;
  padding:26px 24px;text-decoration:none;color:inherit;transition:.15s}
a.card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 6px 18px rgba(20,32,46,.08)}
.card .tag{font-family:'SFMono-Regular',Consolas,monospace;font-size:10px;letter-spacing:.12em;
  color:#fff;background:var(--ink);display:inline-block;padding:3px 9px;border-radius:2px;margin-bottom:14px}
.card.ops .tag{background:var(--blue)}
.card h2{font-size:19px;margin-bottom:8px}
.card p{font-size:13px;color:var(--ink2);line-height:1.6}
.foot{margin-top:26px;font-size:11px;color:var(--ink2);font-family:'SFMono-Regular',Consolas,monospace;
  text-align:center;letter-spacing:.05em}
</style>
</head>
<body>
<div class="box">
  <div class="eyebrow">Store Opening Project</div>
  <h1>出店プロジェクト管理</h1>
  <div class="sub">大崎モデルハウス（PJ-OSAKI-001）／ データベースは1つ・ビューは2つ・即時反映</div>
  <div class="cards">
    <a class="card exec" href="exec.html">
      <span class="tag">EXECUTIVE</span>
      <h2>経営ビュー</h2>
      <p>社長室・社長・役員向け。進捗サマリと社長承認（4点セット）の確認・タスク管理の場。閲覧が中心です。</p>
    </a>
    <a class="card ops" href="ops.html">
      <span class="tag">OPERATIONS</span>
      <h2>実務ビュー</h2>
      <p>実務者向け。各タスクの工程を編集・保存します。保存すると経営ビューにも即座に反映されます。</p>
    </a>
  </div>
  <div class="foot">DATA: Firebase Firestore（単一DB）／ HOSTING: GitHub Pages</div>
</div>
</body>
</html>
